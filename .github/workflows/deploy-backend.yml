name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --omit=dev

      - name: Bundle backend for deployment
        working-directory: ./backend
        run: |
          # Salin mlForecasts.json (hasil ML) ke artifact
          cp -r data ./deploy-data 2>/dev/null || true
          echo "✅ Backend siap untuk deploy"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: |
            backend/
            !backend/node_modules/
          retention-days: 1

      - name: Reinstall for deployment (include node_modules)
        working-directory: ./backend
        run: npm ci --omit=dev

      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            --exclude "*.test.js" \
            --exclude ".env*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App (Backend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          slot-name: 'Production'
          package: ./backend-deploy.zip

      - name: Verify deployment health
        run: |
          sleep 15
          curl --fail https://${{ secrets.AZURE_BACKEND_APP_NAME }}.azurewebsites.net/api/health || echo "⚠️ Health check gagal, cek Azure App Service logs"
